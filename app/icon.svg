<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <defs>
    <linearGradient id="bodyGrad" x1="20%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#bfe3fb"/>
      <stop offset="100%" stop-color="#5aa8dd"/>
    </linearGradient>
  </defs>

  <!-- Drop body -->
  <path d="M60 4 C58 4 22 52 22 80 C22 108 39 132 60 132 C81 132 98 108 98 80 C98 52 62 4 60 4Z"
        fill="url(#bodyGrad)" stroke="#1c3f66" stroke-width="3"/>

  <!-- Coat, spread across the full lower body -->
  <path d="M27 94 C23 111 38 133 60 133 C82 133 97 111 93 94 Z"
        fill="#ffffff" stroke="#1c3f66" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lapel fold lines -->
  <line x1="27" y1="94" x2="49" y2="107" stroke="#1c3f66" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="93" y1="94" x2="71" y2="107" stroke="#1c3f66" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Tie -->
  <path d="M60 101 L66 112 L61.5 126 L60 131 L58.5 126 L54 112Z"
        fill="#4a90d9" stroke="#1c3f66" stroke-width="2" stroke-linejoin="round"/>

  <!-- Glasses -->
  <circle cx="45" cy="72" r="13" fill="none" stroke="#1c3f66" stroke-width="3.2"/>
  <circle cx="75" cy="72" r="13" fill="none" stroke="#1c3f66" stroke-width="3.2"/>
  <line x1="58" y1="72" x2="62" y2="72" stroke="#1c3f66" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="45" cy="72" r="7" fill="#ffffff"/>
  <circle cx="75" cy="72" r="7" fill="#ffffff"/>
  <circle cx="47" cy="73" r="4" fill="#1c3f66"/>
  <circle cx="77" cy="73" r="4" fill="#1c3f66"/>
  <circle cx="45.3" cy="71" r="1.4" fill="#ffffff"/>
  <circle cx="75.3" cy="71" r="1.4" fill="#ffffff"/>
  <ellipse cx="35" cy="83" rx="4" ry="2.5" fill="#ff9d9d" opacity="0.55"/>
  <ellipse cx="85" cy="83" rx="4" ry="2.5" fill="#ff9d9d" opacity="0.55"/>

  <!-- Smile -->
  <path d="M50 87 Q60 97 70 87" fill="none" stroke="#1c3f66" stroke-width="2.8" stroke-linecap="round"/>
</svg>

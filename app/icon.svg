<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 145">
  <defs>
    <linearGradient id="bodyGrad" x1="15%" y1="0%" x2="90%" y2="60%">
      <stop offset="0%" stop-color="#bfe3fb"/>
      <stop offset="55%" stop-color="#7cc0ea"/>
      <stop offset="100%" stop-color="#4f9bd6"/>
    </linearGradient>
  </defs>

  <!-- Arms -->
  <path d="M25 88 Q10 92 11 104" fill="none" stroke="#7cc0ea" stroke-width="7" stroke-linecap="round"/>
  <path d="M95 88 Q110 92 109 104" fill="none" stroke="#7cc0ea" stroke-width="7" stroke-linecap="round"/>
  <circle cx="11" cy="105" r="5.5" fill="#7cc0ea" stroke="#2a5a94" stroke-width="2"/>
  <circle cx="109" cy="105" r="5.5" fill="#7cc0ea" stroke="#2a5a94" stroke-width="2"/>

  <!-- Drop body -->
  <path d="M60 4 C58 4 22 52 22 80 C22 108 39 132 60 132 C81 132 98 108 98 80 C98 52 62 4 60 4Z"
        fill="url(#bodyGrad)" stroke="#2a5a94" stroke-width="3"/>
  <!-- Shine dot -->
  <circle cx="80" cy="40" r="3" fill="#ffffff" opacity="0.55"/>

  <!-- Coat: outer lapels + inner shirt collar + front seam -->
  <path d="M27 94 C23 111 38 133 60 133 C82 133 97 111 93 94 Z"
        fill="#ffffff" stroke="#2a5a94" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="27" y1="94" x2="52" y2="112" stroke="#2a5a94" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="93" y1="94" x2="68" y2="112" stroke="#2a5a94" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="40" y1="94" x2="60" y2="104" stroke="#2a5a94" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="80" y1="94" x2="60" y2="104" stroke="#2a5a94" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="60" y1="122" x2="60" y2="133" stroke="#2a5a94" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <path d="M32 122 Q60 130 88 122" fill="none" stroke="#cfe6f7" stroke-width="2" stroke-linecap="round"/>

  <!-- Tie -->
  <path d="M60 103 L66.5 113 L62 124 L60 130 L58 124 L53.5 113Z"
        fill="#3d7fc4" stroke="#2a5a94" stroke-width="2" stroke-linejoin="round"/>

  <!-- Glasses -->
  <circle cx="45" cy="72" r="13.5" fill="none" stroke="#1c3f66" stroke-width="3.4"/>
  <circle cx="75" cy="72" r="13.5" fill="none" stroke="#1c3f66" stroke-width="3.4"/>
  <line x1="57.5" y1="70" x2="62.5" y2="70" stroke="#1c3f66" stroke-width="4" stroke-linecap="round"/>
  <line x1="31.7" y1="70" x2="24" y2="66" stroke="#1c3f66" stroke-width="3" stroke-linecap="round"/>
  <line x1="88.3" y1="70" x2="96" y2="66" stroke="#1c3f66" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes: white sclera + big iris + pupil + shine -->
  <circle cx="45" cy="73" r="8.5" fill="#ffffff"/>
  <circle cx="75" cy="73" r="8.5" fill="#ffffff"/>
  <circle cx="45.5" cy="73.5" r="6" fill="#3d8bd4"/>
  <circle cx="75.5" cy="73.5" r="6" fill="#3d8bd4"/>
  <circle cx="46" cy="74" r="3" fill="#12263f"/>
  <circle cx="76" cy="74" r="3" fill="#12263f"/>
  <circle cx="43.7" cy="71.3" r="1.8" fill="#ffffff"/>
  <circle cx="73.7" cy="71.3" r="1.8" fill="#ffffff"/>

  <!-- Smile -->
  <path d="M53 87 Q60 92.5 67 87" fill="none" stroke="#1c3f66" stroke-width="2.6" stroke-linecap="round"/>
</svg>

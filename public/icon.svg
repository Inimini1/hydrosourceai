<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140">
  <!-- Drop body baby blue -->
  <defs>
    <radialGradient id="bodyGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d0eeff"/>
      <stop offset="60%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#5ab4e0"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Drop shape -->
  <path d="M60 4 C58 4 22 52 22 80 C22 108 39 132 60 132 C81 132 98 108 98 80 C98 52 62 4 60 4Z" fill="url(#bodyGrad)"/>
  <!-- Highlight shimmer -->
  <ellipse cx="44" cy="60" rx="14" ry="22" fill="url(#highlight)" transform="rotate(-15 44 60)"/>

  <!-- Lab coat collar — white V shape at bottom of drop -->
  <path d="M38 108 Q60 96 82 108 L86 132 Q60 124 34 132 Z" fill="white" opacity="0.92"/>
  <!-- Coat lapel left -->
  <path d="M38 108 Q48 102 58 110 L54 132 Q42 128 34 132 Z" fill="#e8f4fd" opacity="0.9"/>
  <!-- Coat lapel right -->
  <path d="M82 108 Q72 102 62 110 L66 132 Q78 128 86 132 Z" fill="#e8f4fd" opacity="0.9"/>

  <!-- Eyes -->
  <circle cx="46" cy="76" r="9" fill="white"/>
  <circle cx="74" cy="76" r="9" fill="white"/>
  <circle cx="47" cy="77" r="5" fill="#1a2a3a"/>
  <circle cx="75" cy="77" r="5" fill="#1a2a3a"/>
  <!-- Eye shine -->
  <circle cx="49" cy="75" r="2" fill="white"/>
  <circle cx="77" cy="75" r="2" fill="white"/>

  <!-- Glasses frames -->
  <rect x="36" y="67" width="20" height="18" rx="9" ry="9" fill="none" stroke="#2a5a8a" stroke-width="2.5"/>
  <rect x="64" y="67" width="20" height="18" rx="9" ry="9" fill="none" stroke="#2a5a8a" stroke-width="2.5"/>
  <!-- Glasses bridge -->
  <line x1="56" y1="75" x2="64" y2="75" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Temple left -->
  <line x1="36" y1="75" x2="28" y2="72" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Temple right -->
  <line x1="84" y1="75" x2="92" y2="72" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M50 92 Q60 100 70 92" fill="none" stroke="#2a5a8a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small arms -->
  <path d="M26 85 Q16 80 18 72" fill="none" stroke="#89CFF0" stroke-width="5" stroke-linecap="round"/>
  <path d="M94 85 Q104 80 102 72" fill="none" stroke="#89CFF0" stroke-width="5" stroke-linecap="round"/>
  <!-- Hands holding clipboard/beaker hint -->
  <circle cx="17" cy="70" r="4" fill="#89CFF0"/>
  <circle cx="103" cy="70" r="4" fill="#89CFF0"/>
</svg>
